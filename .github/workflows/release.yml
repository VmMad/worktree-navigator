name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            asset_name: worktree-navigator-x86_64-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/worktree-navigator ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          if [ -f README.md ]; then
            tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }} install.sh README.md
          else
            tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }} install.sh
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.tar.gz

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "worktree-navigator ${{ github.ref_name }}"
          body: |
            ## Installation

            ### Quick install (Linux x86_64)

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/worktree-navigator-x86_64-linux-gnu.tar.gz | tar xz
            chmod +x worktree-navigator-x86_64-linux-gnu
            ./install.sh  # or manually copy binary to ~/.local/bin/
            ```

            ### Available binaries

            | File | Target |
            |------|--------|
            | `worktree-navigator-x86_64-linux-gnu.tar.gz` | Linux x86_64 (glibc, most Ubuntu/Debian systems) |

            Each archive contains the binary and `install.sh`.
          files: artifacts/**/*.tar.gz
          fail_on_unmatched_files: true
